<!DOCTYPE html>
<html lang="vi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CẢNH BÁO: HỆ THỐNG BỊ XÂM NHẬP!</title>
    <style>
        /* === RESET & CHUẨN BỊ NỀN TẢNG === */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            user-select: none;
        }

        body, html {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
        }

        /* === GIAI ĐOẠN 1: MÀN HÌNH HACKER TROLL === */
        #terminal-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-color: #0a0a0a;
            color: #00ff00;
            font-family: 'Courier New', Courier, monospace;
            padding: 20px;
            display: flex;
            flex-direction: column;
            justify-content: flex-start;
            z-index: 9999;
            font-size: 14px;
            line-height: 1.6;
        }

        .log-line {
            margin-bottom: 8px;
            white-space: nowrap;
            overflow: hidden;
            width: 0;
            animation: typing 0.5s steps(40, end) forwards;
        }

        @keyframes typing {
            from { width: 0 }
            to { width: 100% }
        }

        .error-text {
            color: #ff3333;
            font-weight: bold;
            font-size: 18px;
            text-align: center;
            margin-top: 20px;
        }

        /* Thanh Progress Bar Giả Trân */
        .progress-container {
            width: 100%;
            max-width: 500px;
            border: 2px solid #00ff00;
            height: 25px;
            margin-top: 20px;
            position: relative;
            background: #000;
            display: none;
        }

        .progress-bar {
            height: 100%;
            background-color: #00ff00;
            width: 0%;
            transition: width 0.1s linear;
        }

        .progress-text {
            position: absolute;
            width: 100%;
            text-align: center;
            top: 50%;
            left: 50%;
            transform: translate(-50%, -50%);
            color: #fff;
            font-weight: bold;
            mix-blend-mode: difference;
        }

        /* === GIAI ĐOẠN 2 & 3: GIAO DIỆN CHÚC MỪNG CHÍNH === */
        #celebration-screen {
            position: fixed;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background: linear-gradient(135deg, #ff9a9e 0%, #fecfef 99%, #fecfef 100%);
            display: none;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            padding: 20px;
            z-index: 1;
            overflow: hidden;
        }

        /* Hiệu ứng đập thình thịch cho khung chứa */
        .main-card {
            background: rgba(255, 255, 255, 0.85);
            backdrop-filter: blur(10px);
            padding: 30px;
            border-radius: 20px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.15);
            max-width: 500px;
            width: 100%;
            animation: bounceIn 1s ease;
            z-index: 10;
        }

        @keyframes bounceIn {
            0% { transform: scale(0.3); opacity: 0; }
            50% { transform: scale(1.05); }
            70% { transform: scale(0.9); }
            100% { transform: scale(1); opacity: 1; }
        }

        h1 {
            color: #ff4757;
            font-size: 28px;
            margin-bottom: 15px;
            text-shadow: 2px 2px 4px rgba(0,0,0,0.1);
            animation: pulse 1.5s infinite;
        }

        @keyframes pulse {
            0% { transform: scale(1); }
            50% { transform: scale(1.03); }
            100% { transform: scale(1); }
        }

        .troll-wish {
            color: #2f3542;
            font-size: 16px;
            font-weight: 600;
            margin-bottom: 20px;
            line-height: 1.5;
        }

        /* Ảnh Meme siêu hài */
        .meme-img {
            width: 100%;
            max-width: 250px;
            height: auto;
            border-radius: 15px;
            margin-bottom: 20px;
            border: 4px dashed #ff6b81;
            transition: transform 0.3s;
        }
        .meme-img:hover {
            transform: rotate(5deg) scale(1.05);
        }

        .question {
            font-size: 18px;
            color: #57606f;
            font-weight: bold;
            margin-bottom: 20px;
        }

        /* Khu vực nút bấm */
        .btn-group {
            display: flex;
            justify-content: center;
            gap: 20px;
            position: relative;
            min-height: 60px;
            width: 100%;
        }

        .btn {
            padding: 12px 30px;
            font-size: 16px;
            font-weight: bold;
            border: none;
            border-radius: 50px;
            cursor: pointer;
            transition: all 0.2s ease;
            box-shadow: 0 5px 15px rgba(0,0,0,0.1);
        }

        #btn-yes {
            background-color: #2ed573;
            color: white;
        }
        #btn-yes:hover {
            background-color: #26af5f;
            transform: scale(1.1);
        }

        #btn-no {
            background-color: #ff4757;
            color: white;
            position: absolute; /* Rất quan trọng để di chuyển tự do */
        }

        /* Canvas Pháo hoa/Confetti */
        canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            pointer-events: none;
            z-index: 2;
        }

        /* CSS Responsive cho Mobile */
        @media (max-width: 480px) {
            h1 { font-size: 22px; }
            .troll-wish { font-size: 14px; }
            .btn { padding: 10px 20px; font-size: 14px; }
            .main-card { padding: 20px; }
        }
    </style>
</head>
<body>

    <!-- Canvas cho hiệu ứng hoa cải rơi lấp lánh -->
    <canvas id="canvas-particles"></canvas>

    <!-- ================= GIAI ĐOẠN 1 ================= -->
    <div id="terminal-screen">
        <div id="log-container"></div>
        <div class="progress-container" id="progress-box">
            <div class="progress-bar" id="progress-bar"></div>
            <div class="progress-text" id="progress-text">0%</div>
        </div>
        <div id="crash-msg" class="error-text"></div>
    </div>

    <!-- ================= GIAI ĐOẠN 2 & 3 ================= -->
    <div id="celebration-screen">
        <div class="main-card">
            <h1 id="main-title">🎉 HAPPY BIRTHDAY ĐỨA BÁO! 🎉</h1>
            
            <p class="troll-wish" id="main-wish">
                Chúc mừng ngày thế giới bớt đi một đứa trẻ trâu, thêm một người trưởng thành (nhưng vẫn báo)! 
                Tuổi mới bớt tạo nghiệp, bớt nói đạo lý, và quan trọng là mau giàu để còn bao tao ăn nhé! 🎂🎁
            </p>

            <!-- HƯỚNG DẪN ĐỔI ẢNH:
                 - Nếu ảnh ở cùng folder với file html này: src="tên_ảnh.png" (Ví dụ: src="meme.png")
                 - Nếu dùng link mạng: src="https://đường_dẫn_ảnh.jpg"
            -->
            <img src="anh.png" 
                 alt="Meme Sinh Nhật" class="meme-img" id="meme-pic">

            <p class="question" id="question-text">Mày có thấy mình vô cùng may mắn khi làm bạn với tao không? 😏</p>

            <div class="btn-group">
                <button class="btn" id="btn-yes" onclick="selectYes()">Có chứ! 😍</button>
                <button class="btn" id="btn-no">Không hề! 👿</button>
            </div>
        </div>
    </div>

    <!-- ================= JAVASCRIPT XỬ LÝ TOÀN BỘ HIỆU ỨNG ================= -->
    <script>
        // === CẤU HÌNH CÁC DÒNG CHỮ CHẠY TROLL (GIAI ĐOẠN 1) ===
        const logs = [
            "[INFO] Đang khởi động tiến trình chiếm quyền điều khiển...",
            "[WARN] Đang quét IP và định vị mục tiêu...",
            "[SUCCESS] Đã tìm thấy đối tượng đang cầm máy với gương mặt ngơ ngác.",
            "[INFO] Tiến hành truy cập vào tài khoản ngân hàng của mày để rút tiền mua quà...",
            "[ERROR] Tài khoản ngân hàng mục tiêu không đủ số dư tối thiểu (Còn đúng cái nịt)... Huỷ tiến trình!",
            "[INFO] Chuyển hướng: Đang tải tất cả dữ liệu nhạy cảm từ Folder 'Tài liệu học tập' dung lượng 100GB...",
            "[DANGER] Đang đồng bộ hóa dữ liệu lên máy chủ TrollLord..."
        ];

        const logContainer = document.getElementById("log-container");
        const progressBox = document.getElementById("progress-box");
        const progressBar = document.getElementById("progress-bar");
        const progressText = document.getElementById("progress-text");
        const crashMsg = document.getElementById("crash-msg");
        const terminalScreen = document.getElementById("terminal-screen");
        const celebrationScreen = document.getElementById("celebration-screen");
        const btnNo = document.getElementById("btn-no");

        let logIndex = 0;

        function printLog() {
            if (logIndex < logs.length) {
                let p = document.createElement("p");
                p.className = "log-line";
                p.innerText = logs[logIndex];
                logContainer.appendChild(p);
                logIndex++;
                setTimeout(printLog, 600); 
            } else {
                progressBox.style.display = "block";
                startLoading();
            }
        }

        function startLoading() {
            let width = 0;
            let interval = setInterval(() => {
                if (width >= 99) {
                    clearInterval(interval);
                    setTimeout(() => {
                        triggerCrash();
                    }, 1500);
                } else {
                    width += Math.floor(Math.random() * 5) + 1;
                    if (width > 99) width = 99;
                    progressBar.style.width = width + "%";
                    progressText.innerText = width + "%";
                }
            }, 100);
        }

        function triggerCrash() {
            crashMsg.innerHTML = "🚨 CRITICAL ERROR: Hệ thống sập vì... hôm nay là sinh nhật mày! 🚨<br>Đang chuyển hướng an toàn...";
            setTimeout(() => {
                terminalScreen.style.display = "none";
                celebrationScreen.style.display = "flex";
                initParticles(); 
            }, 2500);
        }

        window.onload = () => {
            printLog();
            btnNo.style.right = "30px";
            btnNo.style.top = "0px";
        };

        // === GIAI ĐOẠN 3: XỬ LÝ NÚT CHẠY TRỐN (ANTI-CLICK) ===
        function moveButton() {
            const windowWidth = window.innerWidth;
            const windowHeight = window.innerHeight;

            const randomX = Math.max(10, Math.floor(Math.random() * (windowWidth - btnNo.offsetWidth - 20)));
            const randomY = Math.max(10, Math.floor(Math.random() * (windowHeight - btnNo.offsetHeight - 20)));

            btnNo.style.position = "fixed";
            btnNo.style.left = randomX + "px";
            btnNo.style.top = randomY + "px";
        }

        btnNo.addEventListener("mouseenter", moveButton);
        btnNo.addEventListener("touchstart", (e) => {
            e.preventDefault(); 
            moveButton();
        });

        // Khi bấm vào nút CÓ CHỨ!
        function selectYes() {
            document.getElementById("main-title").innerText = "👑 ĐÚNG LÀ BẠN TỐT CỦA TAO! 👑";
            document.getElementById("main-wish").innerText = "Lựa chọn sáng suốt lắm chiến thần! Biết ngay mà, chuẩn bị tinh thần đi bao ăn hoặc nhận quà bất ngờ từ tao đi nhé. Mãi là anh em! ❤️";
            // Link ảnh khi bấm đồng ý ăn mừng
            document.getElementById("meme-pic").src = "https://images.unsplash.com/photo-1513201099705-a9746e1e201f?auto=format&fit=crop&q=80&w=500";
            document.getElementById("question-text").innerText = "Chốt kèo vậy nhé, không có cơ hội rút lui đâu! 😉";
            
            btnNo.style.display = "none";
            document.getElementById("btn-yes").style.transform = "scale(1.3)";
            document.getElementById("btn-yes").disabled = true;

            boomExplosion();
        }

        // === CANVAS HIỆU ỨNG HẠT LẤP LÁNH ===
        const canvas = document.getElementById("canvas-particles");
        const ctx = canvas.getContext("2d");
        let particles = [];
        let colors = ["#ff4757", "#ff6b81", "#2ed573", "#1e90ff", "#ffa502", "#ffffff", "#eccc68"];

        function resizeCanvas() {
            canvas.width = window.innerWidth;
            canvas.height = window.innerHeight;
        }
        window.addEventListener("resize", resizeCanvas);
        resizeCanvas();

        class Particle {
            constructor(x, y, isExplosion = false) {
                this.x = x;
                this.y = y;
                this.isExplosion = isExplosion;
                
                if (isExplosion) {
                    let angle = Math.random() * Math.PI * 2;
                    let speed = Math.random() * 8 + 4;
                    this.vx = Math.cos(angle) * speed;
                    this.vy = Math.sin(angle) * speed;
                    this.gravity = 0.15;
                } else {
                    this.vx = Math.random() * 2 - 1;
                    this.vy = Math.random() * 3 + 2;
                    this.gravity = 0.02;
                }
                
                this.color = colors[Math.floor(Math.random() * colors.length)];
                this.radius = Math.random() * 4 + 3;
                this.opacity = 1;
                this.fade = Math.random() * 0.015 + 0.01;
            }

            draw() {
                ctx.save();
                ctx.globalAlpha = this.opacity;
                ctx.beginPath();
                ctx.arc(this.x, this.y, this.radius, 0, Math.PI * 2);
                ctx.fillStyle = this.color;
                ctx.fill();
                ctx.restore();
            }

            update() {
                this.x += this.vx;
                this.y += this.vy;
                this.vy += this.gravity;
                
                if (this.isExplosion) {
                    this.opacity -= this.fade;
                } else {
                    if (this.y > canvas.height) {
                        this.y = -10;
                        this.x = Math.random() * canvas.width;
                        this.vy = Math.random() * 3 + 2;
                    }
                }
            }
        }

        function initParticles() {
            for (let i = 0; i < 100; i++) {
                particles.push(new Particle(Math.random() * canvas.width, Math.random() * canvas.height, false));
            }
            animate();
        }

        function boomExplosion() {
            for (let i = 0; i < 150; i++) {
                particles.push(new Particle(canvas.width / 2, canvas.height / 2, true));
                particles.push(new Particle(canvas.width * 0.25, canvas.height * 0.3, true));
                particles.push(new Particle(canvas.width * 0.75, canvas.height * 0.3, true));
            }
        }

        function animate() {
            ctx.clearRect(0, 0, canvas.width, canvas.height);
            particles = particles.filter(p => p.opacity > 0);
            particles.forEach(p => {
                p.update();
                p.draw();
            });
            requestAnimationFrame(animate);
        }
    </script>
</body>
</html>
